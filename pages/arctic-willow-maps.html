<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Willow Maps</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    
    <section class="map-scroll-track" id="mapScrollTrack">
        <div class="map-stack">
            <figure class="map-layer visible front">
                <img src="../plant-pages-images/blank-map.png" alt="world map" loading="eager">
            </figure>
            <figure class="map-layer">
                <img src="../arctic-willow-images/arctic-willow-range-map.png" alt="Arctic willow range map"
                    loading="eager">
            </figure>
        </div>
    </section>

    <script src="../scripts/script-homepage-2.js">
    </script>
</body>

</html>
